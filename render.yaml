# Render Blueprint — ONE blueprint, TWO services:
#   1. agentgem  — the API (Docker web service), backed by a Neon Postgres (free).
#   2. agentgem-app — the public marketplace UI (static site, free, CDN-served, no sleep).
#
# Pair the API with a Neon Postgres (free) for DURABLE data — Render's own free
# Postgres self-deletes after 30 days, which would wipe the aggregator's moat.
# Set DATABASE_URL (below) to your Neon connection string.
#
# Full runbook: docs/deploy/render-neon.md
services:
  - name: agentgem
    type: web
    runtime: docker
    plan: free            # free web service SLEEPS after 15 min idle (30-50s cold start).
                          # Bump to `starter` (~$7/mo) for an always-on instance.
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz   # the server's unauthenticated liveness route (src/index.ts)
    envVars:
      - key: HOST
        value: 0.0.0.0          # bind all interfaces (the Dockerfile also sets this)
      - key: SERVE_CONSOLE
        value: "false"          # API-only: the desktop console UI is a LOCAL app, not served on
                                # api.agentgem.ai. `/` redirects to the marketing site instead.
      - key: TRUST_PROXY
        value: "1"              # trust the proxy hop for req.protocol/secure (TLS terminated upstream)
      - key: CLIENT_IP_HEADER
        value: cf-connecting-ip # Render is fronted by Cloudflare; trust-proxy hop-counting is
                                # unreliable here (rotating edge IPs), so key the per-IP rate limits
                                # on Cloudflare's real-client-IP header instead. CF overwrites it, so
                                # it can't be spoofed on this deployment.
      - key: AGGREGATOR_ADMIN_TOKEN
        generateValue: true     # Render generates a random secret; read it from the dashboard
                                # to mint/revoke API keys via POST /api/aggregator/keys
      - key: AGENTGEM_REGISTRY_REPO
        value: ninemindai/agentgem-registry  # public GitHub-backed gem registry read by GET /api/registry/gems.
                                # Public repo → reads need NO token (the Contents API is token-optional). Publishing
                                # needs a GITHUB_TOKEN with repo scope, but that runs out-of-band, not on the server.
      - key: DATABASE_URL
        sync: false             # set manually = your Neon connection string (include ?sslmode=require)
    # PORT is intentionally NOT set here — Render injects its own PORT and the
    # server binds to it (src/index.ts reads process.env.PORT).

  # The public marketplace UI (packages/marketplace) — a Vite/React SPA served as a
  # Render static site. Static sites are free, CDN-served, and DON'T sleep (unlike the
  # free web service above). It reads the agentgem API's public CORS-open endpoints.
  - name: agentgem-app        # globally-unique name → clean agentgem-app.onrender.com URL
    type: web
    runtime: static            # static sites have no plan tier (always free, CDN-served) — do NOT set `plan`
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @agentgem/marketplace build   # Render's build image already ships pnpm; `corepack enable` crashes on its read-only /usr/bin
    staticPublishPath: packages/marketplace/dist
    envVars:
      - key: VITE_API_BASE
        value: https://api.agentgem.ai          # the agentgem service's custom domain (serves the API at /api/* AND the desktop UI at /)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html               # SPA fallback so /ingredient/:id deep-links resolve
