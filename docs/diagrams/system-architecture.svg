  <rect x="200" y="700" width="16" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="222" y="708" fill="#94a3b8" font-size="8">Contract / compose</text>
  <rect x="380" y="700" width="16" height="10" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
