  <text x="52" y="310" fill="#94a3b8" font-size="10" font-weight="600">Gem core — src/gem · pure, framework-agnostic</text>
  <text x="66" y="333" fill="#fb7185" font-size="8" font-weight="600">redaction trust boundary</text>

  <!-- clients text -->
  <text x="250" y="86" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Web UI (browser)</text>
  <text x="250" y="102" fill="#94a3b8" font-size="9" text-anchor="middle">src/public/index.html</text>
  <text x="660" y="86" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Local coding agent</text>
  <text x="660" y="102" fill="#94a3b8" font-size="9" text-anchor="middle">Claude / Codex / …</text>

  <!-- contract text -->
  <text x="190" y="203" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">REST · GemController</text>
  <text x="190" y="219" fill="#94a3b8" font-size="9" text-anchor="middle">/api/* — 35+ endpoints</text>
  <text x="480" y="203" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">MCP · GemTools</text>
  <text x="480" y="219" fill="#94a3b8" font-size="9" text-anchor="middle">/mcp — 6 tools</text>
  <text x="780" y="203" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">OpenAPI 3.1</text>
  <text x="780" y="219" fill="#94a3b8" font-size="9" text-anchor="middle">/explorer (Swagger UI)</text>

  <!-- core text -->
  <text x="155" y="356" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">introspect</text>
  <text x="155" y="372" fill="#94a3b8" font-size="8" text-anchor="middle">~/.claude · plugins</text>
  <text x="155" y="384" fill="#94a3b8" font-size="8" text-anchor="middle">&#8594; ConfigInventory</text>
  <text x="375" y="356" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">redact</text>
  <text x="375" y="372" fill="#94a3b8" font-size="8" text-anchor="middle">strip secrets</text>
  <text x="375" y="384" fill="#94a3b8" font-size="8" text-anchor="middle">&#8594; SecretRef[]</text>
  <text x="595" y="356" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">buildGem</text>
  <text x="595" y="372" fill="#94a3b8" font-size="8" text-anchor="middle">select + checks</text>
  <text x="595" y="384" fill="#94a3b8" font-size="8" text-anchor="middle">&#8594; Gem</text>
  <text x="825" y="356" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">archive</text>
  <text x="825" y="372" fill="#94a3b8" font-size="8" text-anchor="middle">manifest + lock</text>
  <text x="825" y="384" fill="#94a3b8" font-size="8" text-anchor="middle">fs · tar.gz</text>

  <!-- bus -->
  <text x="505" y="466" fill="#a78bfa" font-size="9" text-anchor="middle" font-weight="600">neutral Gem · manifest + lock (the source every consumer reads)</text>

  <!-- distribution text -->
  <text x="160" y="524" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Targets (materialize)</text>
  <text x="160" y="542" fill="#94a3b8" font-size="8" text-anchor="middle">Eve · Flue</text>
  <text x="160" y="555" fill="#94a3b8" font-size="8" text-anchor="middle">OpenAI Sandbox · AgentCore</text>
  <text x="160" y="571" fill="#fbbf24" font-size="8" text-anchor="middle">&#8594; generated FileTree</text>
  <text x="390" y="524" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Registry</text>
  <text x="390" y="542" fill="#94a3b8" font-size="8" text-anchor="middle">GitHub-backed</text>
  <text x="390" y="555" fill="#94a3b8" font-size="8" text-anchor="middle">publish · resolve</text>
  <text x="390" y="571" fill="#fbbf24" font-size="8" text-anchor="middle">merge · install</text>
  <text x="620" y="524" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Deploy backends</text>
  <text x="620" y="542" fill="#94a3b8" font-size="8" text-anchor="middle">Anthropic Managed Agents</text>
  <text x="620" y="555" fill="#94a3b8" font-size="8" text-anchor="middle">AWS Bedrock AgentCore</text>
  <text x="620" y="571" fill="#fbbf24" font-size="8" text-anchor="middle">+ deploy record</text>
  <text x="850" y="524" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Testbed &amp; Run</text>
  <text x="850" y="542" fill="#94a3b8" font-size="8" text-anchor="middle">local .claude testbed</text>
  <text x="850" y="555" fill="#94a3b8" font-size="8" text-anchor="middle">eve / vercel</text>
  <text x="850" y="571" fill="#94a3b8" font-size="8" text-anchor="middle">cloudflare run</text>

  <!-- state text -->
  <text x="500" y="634" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Server state — ~/.agentgem</text>
  <text x="500" y="652" fill="#94a3b8" font-size="9" text-anchor="middle">workspaces/ · recents.json · .env (credentials) · deploy records</text>

  <!-- arrow labels -->
  <text x="214" y="150" fill="#94a3b8" font-size="8" text-anchor="middle">HTTP</text>
  <text x="588" y="150" fill="#94a3b8" font-size="8" text-anchor="middle">MCP</text>

  <!-- legend -->
  <rect x="60" y="700" width="16" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
