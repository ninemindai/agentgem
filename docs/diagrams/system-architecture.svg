<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 810" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1000" height="810" fill="#ffffff"/>
  <rect x="0" y="0" width="1000" height="810" fill="url(#grid)"/>

  <text x="20" y="34" fill="#0f172a" font-size="18" font-weight="700">AgentGem — System Architecture</text>

  <!-- ===== arrows (behind boxes) ===== -->
  <!-- hosts -> contract -->
  <line x1="155" y1="116" x2="180" y2="180" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="116" x2="232" y2="180" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="660" y1="116" x2="490" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- contract -> analyze (optional) -->
  <line x1="190" y1="230" x2="190" y2="298" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <!-- analyze chain -->
  <line x1="310" y1="327" x2="372" y2="327" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="580" y1="327" x2="652" y2="327" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- selection -> buildGem -->
  <line x1="780" y1="354" x2="618" y2="424" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- build entry: contract -> core (left elbow, around analyze) -->
  <polyline points="150,230 52,252 52,458 68,458" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- core pipeline -->
  <line x1="240" y1="458" x2="298" y2="458" stroke="#e11d48" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="458" x2="508" y2="458" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="680" y1="458" x2="738" y2="458" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- core -> distribution bus -->
  <line x1="825" y1="490" x2="825" y2="562" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="160" y1="562" x2="850" y2="562" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="160" y1="562" x2="160" y2="578" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="390" y1="562" x2="390" y2="578" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="562" x2="620" y2="578" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="850" y1="562" x2="850" y2="578" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- distribution -> state -->
  <line x1="620" y1="660" x2="540" y2="690" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <line x1="850" y1="660" x2="640" y2="690" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

  <!-- ===== band boundaries ===== -->
  <rect x="40" y="150" width="920" height="96" rx="12" fill="rgba(5, 150, 105, 0.04)" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="8,4"/>
  <rect x="40" y="268" width="920" height="96" rx="12" fill="rgba(8, 145, 178, 0.04)" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="8,4"/>
  <rect x="40" y="386" width="920" height="160" rx="12" fill="rgba(100, 116, 139, 0.04)" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="8,4"/>
  <rect x="58" y="414" width="402" height="84" rx="8" fill="none" stroke="#e11d48" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== hosts ===== -->
  <rect x="55" y="64" width="200" height="52" rx="6" fill="#ffffff"/>
  <rect x="55" y="64" width="200" height="52" rx="6" fill="rgba(8, 145, 178, 0.10)" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="300" y="64" width="200" height="52" rx="6" fill="#ffffff"/>
  <rect x="300" y="64" width="200" height="52" rx="6" fill="rgba(8, 145, 178, 0.10)" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="560" y="64" width="200" height="52" rx="6" fill="#ffffff"/>
  <rect x="560" y="64" width="200" height="52" rx="6" fill="rgba(100, 116, 139, 0.10)" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== contract ===== -->
  <rect x="70" y="182" width="240" height="48" rx="6" fill="#ffffff"/>
  <rect x="70" y="182" width="240" height="48" rx="6" fill="rgba(5, 150, 105, 0.10)" stroke="#059669" stroke-width="1.5"/>
  <rect x="380" y="182" width="200" height="48" rx="6" fill="#ffffff"/>
  <rect x="380" y="182" width="200" height="48" rx="6" fill="rgba(5, 150, 105, 0.10)" stroke="#059669" stroke-width="1.5"/>
  <rect x="660" y="182" width="240" height="48" rx="6" fill="#ffffff"/>
  <rect x="660" y="182" width="240" height="48" rx="6" fill="rgba(100, 116, 139, 0.10)" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== analyze (optional pre-build assist) ===== -->
  <rect x="70" y="300" width="240" height="54" rx="6" fill="#ffffff"/>
  <rect x="70" y="300" width="240" height="54" rx="6" fill="rgba(100, 116, 139, 0.10)" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="380" y="300" width="200" height="54" rx="6" fill="#ffffff"/>
  <rect x="380" y="300" width="200" height="54" rx="6" fill="rgba(5, 150, 105, 0.10)" stroke="#059669" stroke-width="1.5"/>
  <rect x="660" y="300" width="240" height="54" rx="6" fill="#ffffff"/>
  <rect x="660" y="300" width="240" height="54" rx="6" fill="rgba(8, 145, 178, 0.10)" stroke="#0891b2" stroke-width="1.5"/>

  <!-- ===== core ===== -->
  <rect x="70" y="426" width="170" height="64" rx="6" fill="#ffffff"/>
  <rect x="70" y="426" width="170" height="64" rx="6" fill="rgba(100, 116, 139, 0.10)" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="300" y="426" width="150" height="64" rx="6" fill="#ffffff"/>
  <rect x="300" y="426" width="150" height="64" rx="6" fill="rgba(225, 29, 72, 0.10)" stroke="#e11d48" stroke-width="1.5"/>
  <rect x="510" y="426" width="170" height="64" rx="6" fill="#ffffff"/>
  <rect x="510" y="426" width="170" height="64" rx="6" fill="rgba(5, 150, 105, 0.10)" stroke="#059669" stroke-width="1.5"/>
  <rect x="740" y="426" width="170" height="64" rx="6" fill="#ffffff"/>
  <rect x="740" y="426" width="170" height="64" rx="6" fill="rgba(124, 58, 237, 0.10)" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- ===== distribution ===== -->
  <rect x="60" y="580" width="200" height="80" rx="6" fill="#ffffff"/>
  <rect x="60" y="580" width="200" height="80" rx="6" fill="rgba(217, 119, 6, 0.12)" stroke="#d97706" stroke-width="1.5"/>
  <rect x="300" y="580" width="180" height="80" rx="6" fill="#ffffff"/>
  <rect x="300" y="580" width="180" height="80" rx="6" fill="rgba(217, 119, 6, 0.12)" stroke="#d97706" stroke-width="1.5"/>
  <rect x="520" y="580" width="200" height="80" rx="6" fill="#ffffff"/>
  <rect x="520" y="580" width="200" height="80" rx="6" fill="rgba(217, 119, 6, 0.12)" stroke="#d97706" stroke-width="1.5"/>
  <rect x="760" y="580" width="180" height="80" rx="6" fill="#ffffff"/>
  <rect x="760" y="580" width="180" height="80" rx="6" fill="rgba(124, 58, 237, 0.10)" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- ===== state ===== -->
  <rect x="290" y="690" width="420" height="56" rx="6" fill="#ffffff"/>
  <rect x="290" y="690" width="420" height="56" rx="6" fill="rgba(124, 58, 237, 0.10)" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- ===== band labels ===== -->
  <text x="52" y="146" fill="#64748b" font-size="10" font-weight="600">Hosts · the web UI + local agent reach the same operations</text>
  <text x="52" y="168" fill="#64748b" font-size="10" font-weight="600">Contract surface · one Zod definition &#8594; three boundaries (schemas.ts)</text>
  <text x="52" y="286" fill="#64748b" font-size="10" font-weight="600">Workflow-aware recommendation · POST /workflow/analyze (+ SSE) — optional pre-build assist</text>
  <text x="52" y="404" fill="#64748b" font-size="10" font-weight="600">Gem core — @agentgem/* packages · pure, framework-agnostic</text>
  <text x="66" y="412" fill="#e11d48" font-size="8" font-weight="600">redaction trust boundary</text>

  <!-- hosts text -->
  <text x="155" y="86" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">Desktop (Electron)</text>
  <text x="155" y="102" fill="#64748b" font-size="8" text-anchor="middle">embeds server · tray · auto-update</text>
  <text x="400" y="86" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">Web UI (browser)</text>
  <text x="400" y="102" fill="#64748b" font-size="9" text-anchor="middle">src/public/index.html</text>
  <text x="660" y="86" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">Local coding agent</text>
  <text x="660" y="102" fill="#64748b" font-size="9" text-anchor="middle">Claude / Codex / …</text>

  <!-- contract text -->
  <text x="190" y="203" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">REST · GemController</text>
  <text x="190" y="219" fill="#64748b" font-size="9" text-anchor="middle">/api/* — 35+ endpoints</text>
  <text x="480" y="203" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">MCP · GemTools</text>
  <text x="480" y="219" fill="#64748b" font-size="9" text-anchor="middle">/mcp — 6 tools</text>
  <text x="780" y="203" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">OpenAPI 3.1</text>
  <text x="780" y="219" fill="#64748b" font-size="9" text-anchor="middle">/explorer (Swagger UI)</text>

  <!-- analyze text -->
  <text x="190" y="324" fill="#0f172a" font-size="10" font-weight="600" text-anchor="middle">scan transcripts</text>
  <text x="190" y="340" fill="#64748b" font-size="8" text-anchor="middle">&#8594; WorkflowSignal (deterministic)</text>
  <text x="480" y="324" fill="#0f172a" font-size="10" font-weight="600" text-anchor="middle">ACP recommender</text>
  <text x="480" y="340" fill="#64748b" font-size="8" text-anchor="middle">local Claude · degrades det.</text>
  <text x="780" y="324" fill="#0f172a" font-size="10" font-weight="600" text-anchor="middle">&#8594; GemSelection</text>
  <text x="780" y="340" fill="#64748b" font-size="8" text-anchor="middle">pre-checked in the UI</text>
  <text x="700" y="396" fill="#0891b2" font-size="8" text-anchor="middle">feeds buildGem's selection</text>

  <!-- core text -->
  <text x="155" y="452" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">introspect</text>
  <text x="155" y="468" fill="#64748b" font-size="8" text-anchor="middle">~/.claude · plugins</text>
  <text x="155" y="480" fill="#64748b" font-size="8" text-anchor="middle">&#8594; ConfigInventory</text>
  <text x="375" y="452" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">redact</text>
  <text x="375" y="468" fill="#64748b" font-size="8" text-anchor="middle">strip secrets</text>
  <text x="375" y="480" fill="#64748b" font-size="8" text-anchor="middle">&#8594; SecretRef[]</text>
  <text x="595" y="452" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">buildGem</text>
  <text x="595" y="468" fill="#64748b" font-size="8" text-anchor="middle">select + checks</text>
  <text x="595" y="480" fill="#64748b" font-size="8" text-anchor="middle">&#8594; Gem</text>
  <text x="825" y="452" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">archive</text>
  <text x="825" y="468" fill="#64748b" font-size="8" text-anchor="middle">manifest + lock</text>
  <text x="825" y="480" fill="#64748b" font-size="8" text-anchor="middle">fs · tar.gz</text>

  <!-- bus -->
  <text x="505" y="556" fill="#7c3aed" font-size="9" text-anchor="middle" font-weight="600">neutral Gem · manifest + lock (the source every consumer reads)</text>

  <!-- distribution text -->
  <text x="160" y="604" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">Targets (materialize)</text>
  <text x="160" y="622" fill="#64748b" font-size="8" text-anchor="middle">Eve · Flue · A2A</text>
  <text x="160" y="635" fill="#64748b" font-size="8" text-anchor="middle">OpenAI Sandbox · AgentCore</text>
  <text x="160" y="651" fill="#b45309" font-size="8" text-anchor="middle">&#8594; generated FileTree</text>
  <text x="390" y="604" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">Registry</text>
  <text x="390" y="622" fill="#64748b" font-size="8" text-anchor="middle">GitHub-backed</text>
  <text x="390" y="635" fill="#64748b" font-size="8" text-anchor="middle">publish · resolve</text>
  <text x="390" y="651" fill="#b45309" font-size="8" text-anchor="middle">merge · install</text>
  <text x="620" y="604" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">Deploy backends</text>
  <text x="620" y="622" fill="#64748b" font-size="8" text-anchor="middle">Anthropic Managed Agents</text>
  <text x="620" y="635" fill="#64748b" font-size="8" text-anchor="middle">AWS Bedrock AgentCore</text>
  <text x="620" y="651" fill="#b45309" font-size="8" text-anchor="middle">+ deploy record</text>
  <text x="850" y="604" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">Testbed &amp; Run</text>
  <text x="850" y="622" fill="#64748b" font-size="8" text-anchor="middle">local .claude testbed</text>
  <text x="850" y="635" fill="#64748b" font-size="8" text-anchor="middle">eve / vercel</text>
  <text x="850" y="651" fill="#64748b" font-size="8" text-anchor="middle">cloudflare run</text>

  <!-- state text -->
  <text x="500" y="716" fill="#0f172a" font-size="11" font-weight="600" text-anchor="middle">Server state — ~/.agentgem</text>
  <text x="500" y="734" fill="#64748b" font-size="9" text-anchor="middle">workspaces/ · recents.json · .env (credentials) · deploy records</text>

  <!-- arrow labels -->
  <text x="300" y="146" fill="#64748b" font-size="8" text-anchor="middle">HTTP</text>
  <text x="580" y="146" fill="#64748b" font-size="8" text-anchor="middle">MCP</text>

  <!-- legend -->
  <rect x="60" y="780" width="16" height="10" rx="2" fill="rgba(8, 145, 178, 0.10)" stroke="#0891b2" stroke-width="1"/>
  <text x="82" y="788" fill="#64748b" font-size="8">Host / UI</text>
  <rect x="190" y="780" width="16" height="10" rx="2" fill="rgba(5, 150, 105, 0.10)" stroke="#059669" stroke-width="1"/>
  <text x="212" y="788" fill="#64748b" font-size="8">Contract / compose</text>
  <rect x="370" y="780" width="16" height="10" rx="2" fill="rgba(217, 119, 6, 0.12)" stroke="#d97706" stroke-width="1"/>
  <text x="392" y="788" fill="#64748b" font-size="8">Targets / deploy</text>
  <rect x="530" y="780" width="16" height="10" rx="2" fill="rgba(124, 58, 237, 0.10)" stroke="#7c3aed" stroke-width="1"/>
  <text x="552" y="788" fill="#64748b" font-size="8">Archive / state</text>
  <rect x="690" y="780" width="16" height="10" rx="2" fill="rgba(225, 29, 72, 0.10)" stroke="#e11d48" stroke-width="1"/>
  <text x="712" y="788" fill="#64748b" font-size="8">Redaction</text>
  <rect x="820" y="780" width="16" height="10" rx="2" fill="rgba(100, 116, 139, 0.10)" stroke="#94a3b8" stroke-width="1"/>
  <text x="842" y="788" fill="#64748b" font-size="8">External</text>
</svg>
