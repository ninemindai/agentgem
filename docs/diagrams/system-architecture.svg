  <rect x="40" y="292" width="920" height="156" rx="12" fill="rgba(148, 163, 184, 0.03)" stroke="#475569" stroke-width="1" stroke-dasharray="8,4"/>
  <rect x="58" y="320" width="402" height="92" rx="8" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/>

