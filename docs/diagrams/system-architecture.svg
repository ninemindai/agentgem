  <rect x="540" y="700" width="16" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="562" y="708" fill="#94a3b8" font-size="8">Archive / state</text>
  <rect x="700" y="700" width="16" height="10" rx="2" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="722" y="708" fill="#94a3b8" font-size="8">Redaction</text>
  <rect x="840" y="700" width="16" height="10" rx="2" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="862" y="708" fill="#94a3b8" font-size="8">External</text>
