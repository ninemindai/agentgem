<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="AgentGem — your agent works locally. Gem it.">
  <defs>
    <style>
      .wm { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, "Roboto Mono", monospace; }
    </style>
  </defs>

  <!-- full-bleed paper + gold rule (1.91:1 og card) -->
  <rect x="0" y="0" width="1200" height="630" fill="#f4efe3"/>
  <rect x="0" y="0" width="1200" height="8" fill="#b08436"/>

  <!-- gem mark, vertically centered -->
  <g transform="translate(96 246) scale(3.1)">
    <path d="M20 2 L36 14 L20 38 L4 14 Z" fill="#9a3324"/>
    <path d="M20 2 L36 14 L20 16 Z" fill="#bb4a38"/>
    <path d="M20 2 L4 14 L20 16 Z" fill="#7d2a1e"/>
    <path d="M4 14 L20 16 L20 38 Z" fill="#8b2e21"/>
    <path d="M36 14 L20 16 L20 38 Z" fill="#a8392a"/>
    <path d="M4 14 L36 14 L20 16 Z" fill="#c8543f"/>
  </g>

  <!-- wordmark + taglines -->
  <text class="wm" x="280" y="296" font-size="76" font-weight="700" fill="#211c15" letter-spacing="-1">AgentGem</text>
  <text class="wm" x="282" y="344" font-size="30" font-weight="500" fill="#4a4133">Your agent works locally. <tspan fill="#9a3324" font-weight="700">Gem it.</tspan></text>
  <text class="mono" x="283" y="384" font-size="17" fill="#857a64">secret-safe&#160;·&#160;composable&#160;·&#160;deploy-anywhere Gems for your coding agent</text>
</svg>
