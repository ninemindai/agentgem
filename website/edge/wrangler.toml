#:schema node_modules/wrangler/config-schema.json
# Cloudflare Worker that SERVES agentgem.ninemind.ai from Workers Static Assets
# and adds markdown content negotiation (Accept: text/markdown). See ./README.md.
#
# Mirrors the agentback.dev edge Worker, adapted for a subdomain: `website/dist`
# is uploaded as the Worker's static asset set (the ASSETS binding) and served
# directly at the edge — no separate origin, no second hop.

name = "agentgem-web"
main = "src/markdown-negotiation.js"
compatibility_date = "2026-06-23"
account_id = "8c60d6f6b0408a55768ec315042db967"

# No *.workers.dev URL — this Worker only runs on its custom domains.
workers_dev = false

# Workers Custom Domains. custom_domain = true makes `wrangler deploy` provision
# the proxied DNS record AND the edge TLS cert for each pattern — no manual DNS
# step. Every listed zone must be in this account.
#
# agentgem.ai is the canonical host the Worker serves. agentgem.ninemind.ai is
# an alias the Worker 301-redirects to agentgem.ai (see
# src/markdown-negotiation.js, CANONICAL_HOST). Both are declared here so they
# stay attached: detaching a Custom Domain makes Cloudflare's system actor
# delete its record + cert, which is what took the apex offline once before.
#
# agentgem.dev is NOT a route here: that zone already has its own proxied apex
# records, so a Worker Custom Domain would 409-conflict on every deploy. It is
# redirected to agentgem.ai with a Single Redirect rule in the agentgem.dev
# zone instead (same approach as www.agentgem.ai).
routes = [
  {pattern = "agentgem.ai", custom_domain = true},
  {pattern = "agentgem.ninemind.ai", custom_domain = true},
]

# Upload website/dist as the static asset set. The Worker reads from this
# binding (env.ASSETS) for both normal asset serving and markdown twins.
#
# run_worker_first = true is REQUIRED for negotiation: by default Cloudflare
# serves a matching static asset directly and never invokes the Worker, so the
# Accept: text/markdown branch would be dead code. With it true the Worker runs
# first on every request, then serves the asset via env.ASSETS for the normal
# case.
[vars]
# Hosted aggregator base URL (the share record store), no trailing slash. Empty/unset -> /share
# serves a graceful placeholder. The Worker only does server-to-server GET reads against it.
# Canonical Cloudflare-proxied host (→ Render); keeps traffic on one CF-fronted origin.
AGGREGATOR_API = "https://api.agentgem.ai"

[[rules]]
type = "Data"
globs = ["**/*.ttf"]

[assets]
directory = "../dist"
binding = "ASSETS"
run_worker_first = true
