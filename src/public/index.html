<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>agentgem — Pack Builder</title>
<style>
  :root{--ink:#221d16;--muted:#6f6555;--line:#ddd3c0;--accent:#9a3324;--paper:#f6f2e9;--card:#fff}
  *{box-sizing:border-box}body{margin:0;font:14px/1.5 system-ui,sans-serif;color:var(--ink);background:var(--paper)}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}
  header h1{font-size:16px;margin:0}header .muted{color:var(--muted)}
  main{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 53px)}
  .pane{padding:16px 20px;overflow:auto}.pane.left{border-right:1px solid var(--line)}
  .group{margin-bottom:18px}.group h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px}
  label.row{display:flex;gap:8px;align-items:flex-start;padding:4px 0;cursor:pointer}
  label.row .d{color:var(--muted);font-size:12px}
  label.row .src{font:11px/1 ui-monospace,monospace;color:var(--accent);border:1px solid var(--line);border-radius:4px;padding:1px 4px;margin-left:4px;cursor:pointer}
  label.row .src:hover{background:var(--accent);color:#fff}
  select{padding:6px 8px;border:1px solid var(--line);border-radius:5px;font:inherit;background:var(--card);max-width:48%}
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .bar .chk{display:flex;gap:4px;align-items:center;cursor:pointer;font-size:13px;color:var(--ink)}
  .bar .chk input{margin:0}
  input[type=text]{flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:5px;font:inherit}
  button{padding:6px 12px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:5px;cursor:pointer;font:inherit}
  button.ghost{background:transparent;color:var(--accent)}
  pre{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px;font:12px/1.5 ui-monospace,monospace;white-space:pre-wrap;word-break:break-word}
  .note{color:var(--muted);font-size:12px;margin-top:8px}
  label.row > span{flex:1}
  label.row .view{flex:none;font:11px/1 ui-monospace,monospace;color:var(--muted);border:1px solid var(--line);background:transparent;border-radius:4px;padding:2px 6px;cursor:pointer}
  label.row .view:hover{color:#fff;background:var(--accent);border-color:var(--accent)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:10;padding:24px}
  .modal-bg[hidden]{display:none}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:8px;max-width:840px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .modal-h{display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
  .modal-h .t{font-size:15px}
  .modal-body{margin:0;border:0;border-radius:0 0 8px 8px;overflow:auto;flex:1;background:var(--card)}
  .fm{display:block;background:rgba(154,51,36,.06);border:1px solid var(--line);border-radius:6px;padding:8px;margin-bottom:10px}
  .fmfence{color:var(--muted)} .fmk{color:var(--accent);font-weight:600} .fmc{color:var(--muted)} .fmv{color:var(--ink)}
  .mh{color:var(--accent);font-weight:700} .mq{color:var(--muted);font-style:italic} .mfence{color:var(--muted)}
  .mcode{color:#2e7d32} .mic{color:#2e7d32} .mb{font-weight:700} .mli{color:var(--accent);font-weight:600} .mlink{color:#1a5fb4}
  .redacted{color:#fff;background:var(--accent);border-radius:3px;padding:0 3px;font-weight:600}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:5px;overflow:hidden;margin-left:auto}
  .seg button{border:0;border-radius:0;background:transparent;color:var(--accent);padding:4px 10px;font-size:12px}
  .seg button.on{background:var(--accent);color:#fff}
  .src{font:11px/1 ui-monospace,monospace;color:var(--accent);border:1px solid var(--line);border-radius:4px;padding:1px 4px}
  .psummary{display:flex;flex-direction:column;gap:14px}
  .phead{font-size:14px}
  .pgroup h3{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 6px}
  .prow{display:flex;gap:8px;align-items:center;width:100%;text-align:left;border:0;background:transparent;padding:4px 6px;border-radius:5px;cursor:pointer;font:inherit;color:var(--ink)}
  .prow:hover{background:rgba(154,51,36,.07)}
  .prow .pn{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48%}
  .prow .pm{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap}
  .redtag{color:var(--accent);font-size:11px}
  pre.json{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px;font:12px/1.5 ui-monospace,monospace;white-space:pre-wrap;word-break:break-word;margin:0}
  #projectBar{flex-wrap:wrap}
  .pchip{display:inline-flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:5px;padding:2px 4px 2px 8px;font-size:13px}
  .pchip .premove{border:0;background:transparent;color:var(--muted);padding:0 4px;cursor:pointer;font-size:13px}
  .pchip .premove:hover{color:var(--accent)}
</style>
</head>
<body>
<header><h1>agentgem</h1><span class="muted">Pack Builder · introspecting <code>~/.claude</code> · <code>~/.agents</code> · <code>~/.codex</code></span></header>
<main>
  <section class="pane left">
    <div class="bar"><input id="name" type="text" placeholder="pack name" value="pack" style="flex:1" /></div>
    <div class="bar"><input id="search" type="text" placeholder="search names, descriptions, contents…" style="flex:1" /><select id="srcFilter"><option value="">All sources</option></select></div>
    <div class="bar" id="projectBar"></div>
    <div class="bar" id="agentBar"></div>
    <div class="bar" id="selbar"><strong style="flex:1;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Selection</strong><button id="all" class="ghost">Select all shown</button><button id="none" class="ghost">Clear</button></div>
    <div id="inventory">Loading…</div>
  </section>
  <section class="pane right">
    <div class="bar"><strong style="flex:1">Pack (live)</strong><span class="seg" id="preview-modes"><button type="button" data-pmode="summary">Summary</button><button type="button" data-pmode="json">JSON</button></span><button id="copy" class="ghost">Copy</button><button id="dl">⬇ Download</button></div>
    <div id="preview"></div>
    <p class="note">MCP server config secrets are shown as <code>&lt;redacted&gt;</code> and never exported. Skill, CLAUDE.md &amp; rules bodies are bundled as written — don't keep secrets in them.</p>
  </section>
</main>
<div id="modal" class="modal-bg" hidden>
  <div class="modal">
    <div class="modal-h"><strong class="t" id="modal-title"></strong><span class="src" id="modal-sub"></span><span class="seg" id="modal-modes"><button type="button" data-mode="md">Markdown</button><button type="button" data-mode="raw">Raw</button></span><button id="modal-x" class="ghost" style="margin-left:8px">✕ Close</button></div>
    <pre class="modal-body" id="modal-body"></pre>
  </div>
</div>
<script>
let inv = { skills: [], mcpServers: [], instructions: [], projects: [] };
let projects = []; // chosen project root paths (mirrors inv.projects[].root after each load)
const sel = { skills: new Set(), mcpServers: new Set(), includeInstructions: false, projects: {} };
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
// Map a fine-grained source to the coding agent it belongs to.
const AGENT_LABEL = { claude: "Claude", codex: "Codex", agents: "Agents", project: "Project" };
function agentOf(source){ return source === "project" ? "project" : source === "agent" ? "agents" : source === "codex" ? "codex" : "claude"; }
function group(title, items, kind, projectRoot) {
  if (!items.length && kind !== "instructions") return "";
  const pa = projectRoot ? ` data-project="${esc(projectRoot)}"` : "";
  const rows = items.map(it => {
    const meta = it.description || it.transport || "";
    const src = it.source ? ` <span class="src" data-src="${esc(it.source)}" title="filter by ${esc(it.source)}">${esc(it.source)}</span>` : "";
    return `<label class="row" data-source="${esc(it.source || "")}" data-agent="${agentOf(it.source || "")}"${pa}><input type="checkbox" data-kind="${kind}" data-name="${esc(it.name)}"${pa}> <span>${esc(it.name)}${src} ${meta ? `<span class="d">— ${esc(meta)}</span>` : ""}</span><button type="button" class="view" data-kind="${kind}" data-name="${esc(it.name)}"${pa} title="view content">view</button></label>`;
  }).join("");
  return `<div class="group" data-group="${kind}"><h2>${title} (${items.length})</h2>${rows}</div>`;
}
async function load() {
  const qs = projects.length ? `?projects=${encodeURIComponent(JSON.stringify(projects))}` : "";
  inv = await (await fetch("/api/inventory" + qs)).json();
  inv.projects = inv.projects || [];
  projects = inv.projects.map(p => p.root); // reconcile to server-canonical roots
  let html = group("Skills", inv.skills, "skills") + group("MCP servers", inv.mcpServers, "mcpServers");
  // One include-all toggle for instructions; the label lists every instruction file found
  // (CLAUDE.md, plus any ~/.codex/rules/* files).
  const instrLabel = inv.instructions.length
    ? esc(inv.instructions.map(i => i.name).join(", "))
    : `CLAUDE.md <span class="d">(none)</span>`;
  const instrAgents = [...new Set(inv.instructions.map(i => i.name.startsWith("codex:") ? "codex" : "claude"))].join(" ") || "claude";
  const instrView = inv.instructions.length ? `<button type="button" class="view" data-kind="instructions" data-name="" title="view content">view</button>` : "";
  html += `<div class="group"><h2>Instructions</h2><label class="row" data-source="" data-agent="${instrAgents}"><input type="checkbox" data-kind="instructions"> <span>${instrLabel}</span>${instrView}</label></div>`;
  // One section per loaded project (separate groups, separate selection namespace by root).
  const names = projLabels(inv.projects);
  inv.projects.forEach((p, i) => {
    const nm = esc(names[i]);
    html += group(`Project · ${nm} · skills`, p.skills, "projectSkills", p.root);
    html += group(`Project · ${nm} · MCP`, p.mcpServers, "projectMcpServers", p.root);
    if (p.instructions.length) {
      const pil = esc(p.instructions.map(x => x.name).join(", "));
      html += `<div class="group"><h2>Project · ${nm} · instructions</h2><label class="row" data-source="project" data-agent="project" data-project="${esc(p.root)}"><input type="checkbox" data-kind="projectInstructions" data-project="${esc(p.root)}"> <span><span class="src">project</span> ${pil}</span><button type="button" class="view" data-kind="projectInstructions" data-name="" data-project="${esc(p.root)}" title="view content">view</button></label></div>`;
    }
  });
  document.getElementById("inventory").innerHTML = html;
  // Attach a full-text haystack to each row by looking up its artifact (position-independent).
  document.querySelectorAll("#inventory label.row").forEach(row => {
    const cb = row.querySelector("input[type=checkbox]");
    row._hay = hayForRow(cb && cb.dataset.kind, cb && cb.dataset.name, cb && cb.dataset.project).toLowerCase();
  });
  populateSources();
  populateAgents();
  renderProjectBar();
  // Scope selection toggles to inventory rows only — the filter checkboxes live outside #inventory.
  document.querySelectorAll('#inventory input[type=checkbox]').forEach(cb => cb.addEventListener("change", onToggle));
  restoreChecks();   // reflect persisted selection after a rebuild (e.g. project change)
  refresh();
  filterRows();
}
function hayForRow(kind, name, projRoot) {
  if (kind === "skills") { const a = inv.skills.find(s => s.name === name); return a ? `${a.name} ${a.description || ""} ${a.source || ""} ${a.content || ""}` : ""; }
  if (kind === "mcpServers") { const a = inv.mcpServers.find(s => s.name === name); return a ? `${a.name} ${a.transport || ""} ${a.source || ""} ${JSON.stringify(a.config || {})}` : ""; }
  if (kind === "instructions") return `instructions ${inv.instructions.map(i => `${i.name} ${i.content}`).join(" ")}`;
  if (kind === "projectSkills") { const a = projOf(projRoot)?.skills.find(s => s.name === name); return a ? `${a.name} ${a.description || ""} project ${a.content || ""}` : ""; }
  if (kind === "projectMcpServers") { const a = projOf(projRoot)?.mcpServers.find(s => s.name === name); return a ? `${a.name} ${a.transport || ""} project ${JSON.stringify(a.config || {})}` : ""; }
  if (kind === "projectInstructions") { const p = projOf(projRoot); return `project instructions ${(p ? p.instructions : []).map(i => `${i.name} ${i.content}`).join(" ")}`; }
  return "";
}
function restoreChecks() {
  document.querySelectorAll('#inventory input[type=checkbox]').forEach(cb => {
    const { kind, name, project } = cb.dataset;
    const ps = project ? sel.projects[project] : null;
    if (kind === "instructions") cb.checked = sel.includeInstructions;
    else if (kind === "projectInstructions") cb.checked = !!(ps && ps.includeInstructions);
    else if (kind === "projectSkills") cb.checked = !!(ps && ps.skills.has(name));
    else if (kind === "projectMcpServers") cb.checked = !!(ps && ps.mcpServers.has(name));
    else if (sel[kind]) cb.checked = sel[kind].has(name);
  });
}
function populateAgents() {
  const present = new Set();
  inv.skills.forEach(s => present.add(agentOf(s.source)));
  inv.mcpServers.forEach(m => present.add(agentOf(m.source)));
  inv.instructions.forEach(i => present.add(i.name.startsWith("codex:") ? "codex" : "claude"));
  if ((inv.projects || []).some(p => p.skills.length || p.mcpServers.length || p.instructions.length)) present.add("project");
  const types = ["claude", "codex", "agents", "project"].filter(a => present.has(a));
  const el = document.getElementById("agentBar");
  if (types.length < 2) { el.style.display = "none"; el.innerHTML = ""; return; } // nothing to choose between
  el.style.display = "";
  el.innerHTML = `<span class="d">Agent:</span>` + types.map(a =>
    `<label class="chk"><input type="checkbox" class="agentChk" value="${a}" checked> ${AGENT_LABEL[a]}</label>`).join("");
  el.querySelectorAll(".agentChk").forEach(cb => cb.addEventListener("change", filterRows));
}
function populateSources() {
  const counts = {};
  const all = [...inv.skills, ...inv.mcpServers, ...(inv.projects || []).flatMap(p => [...p.skills, ...p.mcpServers])];
  all.forEach(it => { if (it.source) counts[it.source] = (counts[it.source] || 0) + 1; });
  const rank = s => s === "standalone" ? 0 : s === "user" ? 1 : s === "agent" ? 2 : s === "project" ? 4 : 3;
  const order = Object.keys(counts).sort((a, b) => rank(a) - rank(b) || a.localeCompare(b));
  document.getElementById("srcFilter").innerHTML =
    `<option value="">All sources</option>` + order.map(s => `<option value="${esc(s)}">${esc(s)} (${counts[s]})</option>`).join("");
}
function onToggle(e){
  const { kind, name, project } = e.target.dataset;
  if (kind === "instructions") sel.includeInstructions = e.target.checked;
  else if (kind === "projectInstructions") projSel(project).includeInstructions = e.target.checked;
  else if (kind === "projectSkills") { const s = projSel(project).skills; e.target.checked ? s.add(name) : s.delete(name); }
  else if (kind === "projectMcpServers") { const s = projSel(project).mcpServers; e.target.checked ? s.add(name) : s.delete(name); }
  else { e.target.checked ? sel[kind].add(name) : sel[kind].delete(name); }
  refresh();
}
let t; function refresh(){ clearTimeout(t); t = setTimeout(build, 120); }
function filterRows() {
  const q = (document.getElementById("search").value || "").trim().toLowerCase();
  const tokens = q ? q.split(/\s+/) : [];
  const src = document.getElementById("srcFilter").value;
  const agentBoxes = [...document.querySelectorAll(".agentChk")];
  const agents = new Set(agentBoxes.filter(c => c.checked).map(c => c.value));
  const agentFilterActive = agentBoxes.length > 0 && agentBoxes.some(c => !c.checked);
  document.querySelectorAll("#inventory label.row").forEach(row => {
    const hay = row._hay || "";
    const matchQ = tokens.every(t => hay.includes(t)); // order-independent AND; [] => true
    const matchSrc = !src || (row.getAttribute("data-source") || "") === src;
    const rowAgents = (row.getAttribute("data-agent") || "").split(" ").filter(Boolean);
    const matchAgent = agentBoxes.length === 0 || rowAgents.length === 0 || rowAgents.some(a => agents.has(a));
    row.style.display = matchQ && matchSrc && matchAgent ? "" : "none";
  });
  const active = q || src || agentFilterActive;
  document.querySelectorAll("#inventory .group").forEach(g => {
    const all = g.querySelectorAll("label.row");
    const shown = [...all].filter(r => r.style.display !== "none").length;
    const h2 = g.querySelector("h2");
    if (h2 && !h2.dataset.base) h2.dataset.base = h2.textContent.replace(/\s*—\s*showing.*$/, "");
    if (h2) h2.textContent = active ? `${h2.dataset.base} — showing ${shown}` : h2.dataset.base;
  });
}
async function build(){
  // Prune the selection to what's currently in the inventory. A stale checkbox (e.g. after a
  // project is removed or the inventory reloads) must never reference a missing name/root —
  // buildPack throws on that, which would surface as an opaque 500 in the preview.
  const has = (arr, n) => arr.some(x => x.name === n);
  const skills = [...sel.skills].filter(n => has(inv.skills, n));
  const mcpServers = [...sel.mcpServers].filter(n => has(inv.mcpServers, n));
  const projectsSel = {};
  for (const p of inv.projects || []) {
    const ps = sel.projects[p.root];
    if (!ps) continue;
    const o = {};
    const s = [...ps.skills].filter(n => has(p.skills, n));
    const m = [...ps.mcpServers].filter(n => has(p.mcpServers, n));
    if (s.length) o.skills = s;
    if (m.length) o.mcpServers = m;
    if (ps.includeInstructions && p.instructions.length) o.includeInstructions = true;
    if (Object.keys(o).length) projectsSel[p.root] = o;
  }
  const selection = { skills, mcpServers, includeInstructions: sel.includeInstructions };
  if (Object.keys(projectsSel).length) selection.projects = projectsSel;
  const name = document.getElementById("name").value || "pack";
  const reqBody = { selection, name };
  if (projects.length) reqBody.projects = projects;
  const pack = await (await fetch("/api/pack", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(reqBody) })).json();
  window.__pack = pack;
  renderPreview();
}
let previewMode = "summary";
function fmtSize(n){ return n < 1024 ? `${n} B` : `${(n / 1024).toFixed(n < 10240 ? 1 : 0)} KB`; }
function artSize(a){ return a.type === "mcp_server" ? JSON.stringify(a.config || {}).length : (a.content || "").length; }
function summaryHtml(p){
  const arts = p.artifacts || [];
  if (!arts.length) return `<p class="d">Empty pack — select artifacts on the left to add them.</p>`;
  const total = arts.reduce((s, a) => s + artSize(a), 0);
  const groups = [["Skills", "skill"], ["MCP servers", "mcp_server"], ["Instructions", "instructions"]];
  let h = `<div class="psummary"><div class="phead"><strong>${esc(p.name)}</strong> <span class="d">· ${arts.length} artifact${arts.length === 1 ? "" : "s"} · ${fmtSize(total)}</span></div>`;
  for (const [label, type] of groups) {
    const items = arts.filter(a => a.type === type);
    if (!items.length) continue;
    h += `<div class="pgroup"><h3>${label} (${items.length})</h3>` + items.map(a => {
      const i = arts.indexOf(a);
      const src = a.source ? `<span class="src">${esc(a.source)}</span>` : "";
      const meta = a.type === "mcp_server" ? `${esc(a.transport || "")} · <span class="redtag">redacted</span>` : fmtSize(artSize(a));
      return `<button type="button" class="prow" data-i="${i}"><span class="pn">${esc(a.name)}</span> ${src} <span class="pm">${meta}</span></button>`;
    }).join("") + `</div>`;
  }
  return h + `</div>`;
}
function renderPreview(){
  const el = document.getElementById("preview");
  const p = window.__pack;
  if (!p) { el.textContent = ""; }
  else if (p.error || previewMode === "json") {
    el.innerHTML = ""; const pre = document.createElement("pre"); pre.className = "json";
    pre.textContent = JSON.stringify(p, null, 2); el.appendChild(pre);
  } else {
    el.innerHTML = summaryHtml(p);
  }
  document.querySelectorAll("#preview-modes button").forEach(b => b.classList.toggle("on", b.dataset.pmode === previewMode));
}
function openArtifact(art){
  const isMcp = art.type === "mcp_server";
  modalState.kind = isMcp ? "mcpServers" : "skills";
  modalState.body = isMcp ? JSON.stringify(art.config, null, 2) : (art.content || "");
  document.getElementById("modal-title").textContent = art.name;
  document.getElementById("modal-sub").textContent = (art.source || "") + (art.transport ? ` · ${art.transport}` : "");
  renderModalBody();
  document.getElementById("modal").hidden = false;
}
document.getElementById("preview-modes").addEventListener("click", e => {
  const b = e.target.closest("button[data-pmode]"); if (!b) return;
  previewMode = b.dataset.pmode; renderPreview();
});
document.getElementById("preview").addEventListener("click", e => {
  const row = e.target.closest(".prow"); if (!row) return;
  const art = (window.__pack && window.__pack.artifacts) ? window.__pack.artifacts[+row.dataset.i] : null;
  if (art) openArtifact(art);
});
document.getElementById("all").addEventListener("click", () => {
  // Select only rows currently visible under the active filters.
  document.querySelectorAll('#inventory label.row').forEach(row => {
    if (row.style.display === "none") return;
    const cb = row.querySelector('input[type=checkbox]');
    if (cb && !cb.checked) { cb.checked = true; cb.dispatchEvent(new Event("change")); }
  });
});
document.getElementById("none").addEventListener("click", () => {
  document.querySelectorAll('#inventory input[type=checkbox]').forEach(cb => {
    if (cb.checked) { cb.checked = false; cb.dispatchEvent(new Event("change")); }
  });
});
document.getElementById("name").addEventListener("input", refresh);
document.getElementById("dl").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(window.__pack || {}, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = (document.getElementById("name").value || "pack") + ".json"; a.click();
});
document.getElementById("copy").addEventListener("click", () => navigator.clipboard.writeText(JSON.stringify(window.__pack || {}, null, 2)));
document.getElementById("srcFilter").addEventListener("change", filterRows);
document.getElementById("inventory").addEventListener("click", e => {
  // View an item's content in a modal (must not toggle the row's checkbox).
  const v = e.target.closest(".view");
  if (v) { e.preventDefault(); e.stopPropagation(); openItem(v.dataset.kind, v.dataset.name, v.dataset.project); return; }
  // Click a source chip to scope the source filter to it (click again to clear).
  const chip = e.target.closest(".src");
  if (!chip) return;
  e.preventDefault(); e.stopPropagation();
  const el = document.getElementById("srcFilter");
  const val = chip.getAttribute("data-src") || "";
  el.value = el.value === val ? "" : val;
  filterRows();
});
// --- Content viewer modal with Raw / Markdown forms. ALL highlighters escape the text
// first and only inject their own <span> tags, so untrusted skill/rules bodies can never
// become live markup. "Raw" uses textContent; the bytes are always faithful in both modes. ---
const modalState = { kind: "", body: "", mode: "md" };
function hlFrontmatter(raw) {
  return raw.split("\n").map(line => {
    if (/^---\s*$/.test(line)) return `<span class="fmfence">${esc(line)}</span>`;
    const m = line.match(/^(\s*)([A-Za-z0-9_-]+)(:)(.*)$/);
    if (m) return `${esc(m[1])}<span class="fmk">${esc(m[2])}</span><span class="fmc">${esc(m[3])}</span><span class="fmv">${esc(m[4])}</span>`;
    return esc(line);
  }).join("\n");
}
function hlMarkdown(raw) {
  const out = []; let inFence = false;
  for (const line of raw.split("\n")) {
    if (/^\s*```/.test(line)) { inFence = !inFence; out.push(`<span class="mfence">${esc(line)}</span>`); continue; }
    if (inFence) { out.push(`<span class="mcode">${esc(line)}</span>`); continue; }
    if (/^#{1,6}\s/.test(line)) { out.push(`<span class="mh">${esc(line)}</span>`); continue; }
    if (/^\s*>/.test(line)) { out.push(`<span class="mq">${esc(line)}</span>`); continue; }
    let s = esc(line);
    s = s.replace(/`([^`]+)`/g, '<span class="mic">`$1`</span>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<span class="mb">**$1**</span>');
    s = s.replace(/^(\s*)([-*+]|\d+\.)(\s)/, '$1<span class="mli">$2</span>$3');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<span class="mlink">[$1]($2)</span>');
    out.push(s);
  }
  return out.join("\n");
}
function highlight(kind, body) {
  if (kind === "mcpServers") return esc(body).replace(/&lt;redacted&gt;/g, '<span class="redacted">&lt;redacted&gt;</span>');
  const m = body.match(/^(---\n[\s\S]*?\n---)\n?([\s\S]*)$/);
  return m ? `<div class="fm">${hlFrontmatter(m[1])}</div>${hlMarkdown(m[2])}` : hlMarkdown(body);
}
function renderModalBody() {
  const el = document.getElementById("modal-body");
  if (modalState.mode === "raw") el.textContent = modalState.body;
  else el.innerHTML = highlight(modalState.kind, modalState.body);
  document.querySelectorAll("#modal-modes button").forEach(b => b.classList.toggle("on", b.dataset.mode === modalState.mode));
}
function openItem(kind, name, projRoot) {
  let title = name, sub = "", body = "";
  if (kind === "skills" || kind === "projectSkills") {
    const a = (kind === "skills" ? inv.skills : (projOf(projRoot)?.skills || [])).find(s => s.name === name);
    if (!a) return;
    sub = a.source || ""; body = a.content || "";
  } else if (kind === "mcpServers" || kind === "projectMcpServers") {
    const a = (kind === "mcpServers" ? inv.mcpServers : (projOf(projRoot)?.mcpServers || [])).find(s => s.name === name);
    if (!a) return;
    sub = `${a.source || ""} · ${a.transport}`; body = JSON.stringify(a.config, null, 2);
  } else if (kind === "instructions" || kind === "projectInstructions") {
    const list = kind === "instructions" ? inv.instructions : (projOf(projRoot)?.instructions || []);
    title = kind === "instructions" ? "Instructions" : "Project instructions";
    sub = list.map(i => i.name).join(", ");
    body = list.map(i => `### ${i.name}\n\n${i.content}`).join("\n\n──────────\n\n");
  } else return;
  // highlight() only special-cases mcp configs (JSON); everything else gets markdown highlighting.
  modalState.kind = (kind === "mcpServers" || kind === "projectMcpServers") ? "mcpServers" : "skills";
  modalState.body = body;
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-sub").textContent = sub;
  renderModalBody();
  document.getElementById("modal").hidden = false;
}
function closeModal(){ document.getElementById("modal").hidden = true; }
document.getElementById("modal-modes").addEventListener("click", e => {
  const b = e.target.closest("button[data-mode]"); if (!b) return;
  modalState.mode = b.dataset.mode; renderModalBody();   // persists across opens
});
document.getElementById("modal-x").addEventListener("click", closeModal);
document.getElementById("modal").addEventListener("click", e => { if (e.target.id === "modal") closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// --- Projects: OS-native folder picker; multiple roots, each labeled by name. ---
function projOf(root) { return (inv.projects || []).find(p => p.root === root); }
function projSel(root) { return (sel.projects[root] ??= { skills: new Set(), mcpServers: new Set(), includeInstructions: false }); }
// Display name = basename, disambiguated by parent dir when two projects share a basename.
function projLabels(projs) {
  const counts = {};
  projs.forEach(p => (counts[p.name] = (counts[p.name] || 0) + 1));
  return projs.map(p => (counts[p.name] > 1 ? `${p.name} (…/${p.root.split("/").slice(-2, -1)[0] || ""})` : p.name));
}
function renderProjectBar() {
  const el = document.getElementById("projectBar");
  const names = projLabels(inv.projects || []);
  const chips = (inv.projects || []).map((p, i) =>
    `<span class="pchip" title="${esc(p.root)}">📁 ${esc(names[i])}<button class="premove ghost" data-root="${esc(p.root)}" title="remove project">✕</button></span>`).join("");
  el.innerHTML = (chips ? `<span class="d">Projects:</span> ${chips} ` : "")
    + `<button id="addProject" class="ghost">📁 Add project…</button>`
    + (chips ? "" : `<span class="d">discover skills, MCP &amp; instructions from project roots</span>`);
}
function addProject(path) {
  const clean = (path || "").replace(/\/+$/, "");
  if (clean && !projects.includes(clean)) { projects.push(clean); load(); }
}
function removeProject(root) {
  projects = projects.filter(r => r !== root);
  delete sel.projects[root];
  load();
}
async function pickProject() {
  const el = document.getElementById("projectBar");
  el.style.opacity = ".5"; // brief hint while the native dialog is open
  try {
    const r = await (await fetch("/api/pick-folder")).json();
    if (r && r.path) addProject(r.path); // null = user cancelled -> keep current
  } finally {
    el.style.opacity = "";
  }
}
document.getElementById("projectBar").addEventListener("click", e => {
  const rm = e.target.closest(".premove");
  if (rm) { removeProject(rm.dataset.root); return; }
  if (e.target.closest("#addProject")) pickProject();
});
document.getElementById("search").addEventListener("input", filterRows);
load();
</script>
