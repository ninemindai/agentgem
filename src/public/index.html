<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>agentpack — Pack Builder</title>
<style>
  :root{--ink:#221d16;--muted:#6f6555;--line:#ddd3c0;--accent:#9a3324;--paper:#f6f2e9;--card:#fff}
  *{box-sizing:border-box}body{margin:0;font:14px/1.5 system-ui,sans-serif;color:var(--ink);background:var(--paper)}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center}
  header h1{font-size:16px;margin:0}header .muted{color:var(--muted)}
  main{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 53px)}
  .pane{padding:16px 20px;overflow:auto}.pane.left{border-right:1px solid var(--line)}
  .group{margin-bottom:18px}.group h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px}
  label.row{display:flex;gap:8px;align-items:flex-start;padding:4px 0;cursor:pointer}
  label.row .d{color:var(--muted);font-size:12px}
  label.row .src{font:11px/1 ui-monospace,monospace;color:var(--accent);border:1px solid var(--line);border-radius:4px;padding:1px 4px;margin-left:4px;cursor:pointer}
  label.row .src:hover{background:var(--accent);color:#fff}
  select{padding:6px 8px;border:1px solid var(--line);border-radius:5px;font:inherit;background:var(--card);max-width:48%}
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .bar .chk{display:flex;gap:4px;align-items:center;cursor:pointer;font-size:13px;color:var(--ink)}
  .bar .chk input{margin:0}
  input[type=text]{flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:5px;font:inherit}
  button{padding:6px 12px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:5px;cursor:pointer;font:inherit}
  button.ghost{background:transparent;color:var(--accent)}
  pre{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px;font:12px/1.5 ui-monospace,monospace;white-space:pre-wrap;word-break:break-word}
  .note{color:var(--muted);font-size:12px;margin-top:8px}
</style>
</head>
<body>
<header><h1>agentpack</h1><span class="muted">Pack Builder · introspecting <code>~/.claude</code> · <code>~/.agents</code> · <code>~/.codex</code></span></header>
<main>
  <section class="pane left">
    <div class="bar"><input id="name" type="text" placeholder="pack name" value="pack" style="flex:1" /></div>
    <div class="bar"><input id="search" type="text" placeholder="search names, descriptions, contents…" style="flex:1" /><select id="srcFilter"><option value="">All sources</option></select></div>
    <div class="bar" id="agentBar"></div>
    <div class="bar" id="selbar"><strong style="flex:1;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Selection</strong><button id="all" class="ghost">Select all shown</button><button id="none" class="ghost">Clear</button></div>
    <div id="inventory">Loading…</div>
  </section>
  <section class="pane right">
    <div class="bar"><strong style="flex:1">pack.json (live)</strong><button id="copy" class="ghost">Copy</button><button id="dl">⬇ Download</button></div>
    <pre id="preview">{}</pre>
    <p class="note">MCP server config secrets are shown as <code>&lt;redacted&gt;</code> and never exported. Skill, CLAUDE.md &amp; rules bodies are bundled as written — don't keep secrets in them.</p>
  </section>
</main>
<script>
let inv = { skills: [], mcpServers: [], instructions: [] };
const sel = { skills: new Set(), mcpServers: new Set(), includeInstructions: false };
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
// Map a fine-grained source to the coding agent it belongs to.
const AGENT_LABEL = { claude: "Claude", codex: "Codex", agents: "Agents" };
function agentOf(source){ return source === "agent" ? "agents" : source === "codex" ? "codex" : "claude"; }
function group(title, items, kind) {
  if (!items.length && kind !== "instructions") return "";
  const rows = items.map(it => {
    const meta = it.description || it.transport || "";
    const src = it.source ? ` <span class="src" data-src="${esc(it.source)}" title="filter by ${esc(it.source)}">${esc(it.source)}</span>` : "";
    return `<label class="row" data-source="${esc(it.source || "")}" data-agent="${agentOf(it.source || "")}"><input type="checkbox" data-kind="${kind}" data-name="${esc(it.name)}"> <span>${esc(it.name)}${src} ${meta ? `<span class="d">— ${esc(meta)}</span>` : ""}</span></label>`;
  }).join("");
  return `<div class="group" data-group="${kind}"><h2>${title} (${items.length})</h2>${rows}</div>`;
}
async function load() {
  inv = await (await fetch("/api/inventory")).json();
  let html = group("Skills", inv.skills, "skills") + group("MCP servers", inv.mcpServers, "mcpServers");
  // One include-all toggle for instructions; the label lists every instruction file found
  // (CLAUDE.md, plus any ~/.codex/rules/* files).
  const instrLabel = inv.instructions.length
    ? esc(inv.instructions.map(i => i.name).join(", "))
    : `CLAUDE.md <span class="d">(none)</span>`;
  // The instructions row aggregates CLAUDE.md (claude) and any codex rules, so it belongs
  // to every agent whose instruction files are present — show it if any is enabled.
  const instrAgents = [...new Set(inv.instructions.map(i => i.name.startsWith("codex:") ? "codex" : "claude"))].join(" ") || "claude";
  html += `<div class="group"><h2>Instructions</h2><label class="row" data-source="" data-agent="${instrAgents}"><input type="checkbox" data-kind="instructions"> <span>${instrLabel}</span></label></div>`;
  document.getElementById("inventory").innerHTML = html;
  // Attach a full-text haystack (name + meta + source + body) to each row, in DOM order.
  // Kept as a JS property, not a DOM attribute, so large skill bodies don't bloat the markup.
  const hayOf = it => `${it.name} ${it.description || it.transport || ""} ${it.source || ""} ${it.content || ""}`.toLowerCase();
  const instrHay = `instructions ${inv.instructions.map(i => `${i.name} ${i.content}`).join(" ")}`.toLowerCase();
  const hays = [...inv.skills.map(hayOf), ...inv.mcpServers.map(hayOf), instrHay];
  document.querySelectorAll("#inventory label.row").forEach((row, i) => { row._hay = hays[i] || ""; });
  populateSources();
  populateAgents();
  // Scope selection toggles to inventory rows only — the agent-filter checkboxes live
  // outside #inventory and must not be treated as artifact selections.
  document.querySelectorAll('#inventory input[type=checkbox]').forEach(cb => cb.addEventListener("change", onToggle));
  refresh();
  document.getElementById("search").addEventListener("input", filterRows);
  filterRows();
}
function populateAgents() {
  const present = new Set();
  inv.skills.forEach(s => present.add(agentOf(s.source)));
  inv.mcpServers.forEach(m => present.add(agentOf(m.source)));
  inv.instructions.forEach(i => present.add(i.name.startsWith("codex:") ? "codex" : "claude"));
  const types = ["claude", "codex", "agents"].filter(a => present.has(a));
  const el = document.getElementById("agentBar");
  if (types.length < 2) { el.style.display = "none"; el.innerHTML = ""; return; } // nothing to choose between
  el.style.display = "";
  el.innerHTML = `<span class="d">Agent:</span>` + types.map(a =>
    `<label class="chk"><input type="checkbox" class="agentChk" value="${a}" checked> ${AGENT_LABEL[a]}</label>`).join("");
  el.querySelectorAll(".agentChk").forEach(cb => cb.addEventListener("change", filterRows));
}
function populateSources() {
  const counts = {};
  [...inv.skills, ...inv.mcpServers].forEach(it => { if (it.source) counts[it.source] = (counts[it.source] || 0) + 1; });
  const rank = s => s === "standalone" ? 0 : s === "user" ? 1 : s === "agent" ? 2 : 3;
  const order = Object.keys(counts).sort((a, b) => rank(a) - rank(b) || a.localeCompare(b));
  document.getElementById("srcFilter").innerHTML =
    `<option value="">All sources</option>` + order.map(s => `<option value="${esc(s)}">${esc(s)} (${counts[s]})</option>`).join("");
}
function onToggle(e){
  const { kind, name } = e.target.dataset;
  if (kind === "instructions") sel.includeInstructions = e.target.checked;
  else { e.target.checked ? sel[kind].add(name) : sel[kind].delete(name); }
  refresh();
}
let t; function refresh(){ clearTimeout(t); t = setTimeout(build, 120); }
function filterRows() {
  const q = (document.getElementById("search").value || "").trim().toLowerCase();
  const tokens = q ? q.split(/\s+/) : [];
  const src = document.getElementById("srcFilter").value;
  const agentBoxes = [...document.querySelectorAll(".agentChk")];
  const agents = new Set(agentBoxes.filter(c => c.checked).map(c => c.value));
  const agentFilterActive = agentBoxes.length > 0 && agentBoxes.some(c => !c.checked);
  document.querySelectorAll("#inventory label.row").forEach(row => {
    const hay = row._hay || "";
    const matchQ = tokens.every(t => hay.includes(t)); // order-independent AND; [] => true
    const matchSrc = !src || (row.getAttribute("data-source") || "") === src;
    const rowAgents = (row.getAttribute("data-agent") || "").split(" ").filter(Boolean);
    const matchAgent = agentBoxes.length === 0 || rowAgents.length === 0 || rowAgents.some(a => agents.has(a));
    row.style.display = matchQ && matchSrc && matchAgent ? "" : "none";
  });
  const active = q || src || agentFilterActive;
  document.querySelectorAll("#inventory .group").forEach(g => {
    const all = g.querySelectorAll("label.row");
    const shown = [...all].filter(r => r.style.display !== "none").length;
    const h2 = g.querySelector("h2");
    if (h2 && !h2.dataset.base) h2.dataset.base = h2.textContent.replace(/\s*—\s*showing.*$/, "");
    if (h2) h2.textContent = active ? `${h2.dataset.base} — showing ${shown}` : h2.dataset.base;
  });
}
async function build(){
  const selection = { skills: [...sel.skills], mcpServers: [...sel.mcpServers], includeInstructions: sel.includeInstructions };
  const name = document.getElementById("name").value || "pack";
  const pack = await (await fetch("/api/pack", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ selection, name }) })).json();
  window.__pack = pack;
  document.getElementById("preview").textContent = JSON.stringify(pack, null, 2);
}
document.getElementById("all").addEventListener("click", () => {
  // Select only rows currently visible under the active filters.
  document.querySelectorAll('#inventory label.row').forEach(row => {
    if (row.style.display === "none") return;
    const cb = row.querySelector('input[type=checkbox]');
    if (cb && !cb.checked) { cb.checked = true; cb.dispatchEvent(new Event("change")); }
  });
});
document.getElementById("none").addEventListener("click", () => {
  document.querySelectorAll('#inventory input[type=checkbox]').forEach(cb => {
    if (cb.checked) { cb.checked = false; cb.dispatchEvent(new Event("change")); }
  });
});
document.getElementById("name").addEventListener("input", refresh);
document.getElementById("dl").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(window.__pack || {}, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = (document.getElementById("name").value || "pack") + ".json"; a.click();
});
document.getElementById("copy").addEventListener("click", () => navigator.clipboard.writeText(document.getElementById("preview").textContent));
document.getElementById("srcFilter").addEventListener("change", filterRows);
// Click a source chip to scope the source filter to it (click again to clear).
document.getElementById("inventory").addEventListener("click", e => {
  const chip = e.target.closest(".src");
  if (!chip) return;
  e.preventDefault(); e.stopPropagation();
  const el = document.getElementById("srcFilter");
  const val = chip.getAttribute("data-src") || "";
  el.value = el.value === val ? "" : val;
  filterRows();
});
load();
</script>
</body>
</html>
