name: Desktop Release
on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

# Each OS builds its own installers (no publish), uploads them as artifacts; a
# final job attaches everything to the GitHub Release for the triggering tag.
# Publishing is decoupled from electron-builder because its default release tag
# is v{version} (e.g. v0.1.1) — which collides with the npm core's tag. We want
# the desktop-v* tag instead.
jobs:
  build:
    strategy:
      fail-fast: false # one platform failing must not cancel the others
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install
      - run: pnpm -C desktop install
      # Build installers only (no publish). Unsigned: signing auto-discovery is
      # off and the signing vars are intentionally NOT passed — passing an empty
      # CSC_LINK makes electron-builder attempt (and fail) to load a cert on macOS.
      #
      # To enable signing later, add back an env block here with the real secrets:
      #   CSC_LINK / CSC_KEY_PASSWORD          (cert; both platforms)
      #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID  (macOS notarize)
      # and set `mac.notarize: true` in electron-builder.yml.
      - run: pnpm -C desktop dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    # Publish whatever built, even if a platform failed; only on a tag push.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          NOTES="Unsigned desktop builds. First launch: macOS — right-click → Open; Windows — More info → Run anyway."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" artifacts/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "AgentGem Desktop $TAG" \
              --notes "$NOTES"
          fi
